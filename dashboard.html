<!-- dashboard.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RailHygiene - Live Data Dashboard</title>
  <meta name="description" content="View the RailHygiene Live Data Dashboard. Access crowdsourced data and stats on Indian Railways coach cleanliness and user feedback.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Prevents double scrollbars */
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: oklch(98% 0.01 240); /* Matches the React dashboard background */
      color: oklch(25% 0.02 240);
    }
    .dashboard-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .dashboard-header {
      padding: 16px 48px;
      background-color: transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .dashboard-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 500;
      color: oklch(50% 0.02 240); /* Matches text-secondary */
      letter-spacing: -0.01em;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      text-decoration: none;
      color: oklch(60% 0.15 250); /* Accent color */
      font-weight: 600;
      font-size: 0.95rem;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .back-btn:hover {
      background-color: oklch(92% 0.01 240); /* Border color */
    }
    .warning-text {
      color: oklch(45% 0.15 35); /* Alert text color */
      font-weight: 600;
      font-size: 0.9rem;
      background-color: oklch(96% 0.05 40); /* Alert bg */
      padding: 4px 12px;
      border-radius: 20px;
    }
    .iframe-wrapper {
      flex-grow: 1; /* Allows the iframe to take all available space */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <header class="dashboard-header">
      <h1>
        RailHygiene Dashboard Hub
        <span class="warning-text">Automatic Data Refresh Once a Day</span>
      </h1>
      <div class="header-actions">
        <a href="./index.html" class="back-btn">← Back to Home</a>
      </div>
    </header>
    <div class="iframe-wrapper">
      <iframe 
        src="https://railhygienemvp.web.app/" 
        title="RailHygiene Live Data Dashboard">
      </iframe>
    </div>
  </div>
</body>
</html>
